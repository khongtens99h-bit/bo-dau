<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tool Tạo Slug</title>

  <style>

    *{
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      margin:0;
      padding:30px;
      background:#f5f5f5;
    }

    .container{
      max-width:950px;
      margin:auto;
      background:#fff;
      padding:24px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      margin-top:0;
      margin-bottom:24px;
    }

    textarea{
      width:100%;
      min-height:180px;
      padding:16px;
      border-radius:12px;
      border:1px solid #ccc;
      resize:vertical;
      font-size:15px;
      line-height:1.6;
      outline:none;
    }

    .top-buttons{
      display:flex;
      gap:10px;
      margin-top:16px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .convert-btn{
      background:#111;
      color:#fff;
      padding:12px 18px;
    }

    .clear-btn{
      background:#e5e5e5;
      color:#111;
      padding:12px 18px;
    }

    .label{
      font-weight:bold;
      margin-bottom:10px;
    }

    .results{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .item{
      display:flex;
      align-items:center;
      gap:14px;
      background:#fafafa;
      border:1px solid #e3e3e3;
      border-radius:12px;
      padding:14px 16px;
      transition:0.25s;
    }

    .item.copied{
      background:#dcfce7;
      border-color:#22c55e;
    }

    .number{
      width:34px;
      height:34px;
      border-radius:8px;
      background:#111;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:bold;
      flex-shrink:0;
      transition:0.25s;
    }

    .item.copied .number{
      background:#22c55e;
    }

    .slug-text{
      flex:1;
      font-size:15px;
      word-break:break-word;
    }

    .copy-btn{
      min-width:84px;
      height:36px;
      padding:0 14px;
      background:#111;
      color:#fff;
      border-radius:8px;
      font-size:13px;
      transition:0.2s;
      flex-shrink:0;
    }

    .copy-btn.copied{
      background:#22c55e;
    }

    .copy-btn.flash{
      background:#111 !important;
      color:#fff;
    }

    .copy-btn.copied:hover{
      background:#111;
    }

    @media(max-width:768px){

      body{
        padding:16px;
      }

      .item{
        padding:12px;
      }

      .slug-text{
        font-size:14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Tool Chuyển Chữ Thành Slug</h1>

    <div class="label">
      Nhập nội dung (mỗi dòng là một kết quả)
    </div>

    <textarea 
      id="inputText"
      placeholder="Ví dụ:
Áo Đấu DNY SPORT
Áo Khoác Thể Thao
Áo Gym Nam"
    ></textarea>

    <div class="top-buttons">
      <button class="convert-btn" onclick="convertText()">
        Chuyển đổi
      </button>

      <button class="clear-btn" onclick="clearText()">
        Xóa tất cả
      </button>
    </div>

    <div class="label">
      Kết quả
    </div>

    <div id="results" class="results"></div>

  </div>

  <script>

    const inputText = document.getElementById("inputText");
    const results = document.getElementById("results");

    function createSlug(text) {

      return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "d")
        .replace(/[^a-z0-9\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");

    }

    function convertText() {

      results.innerHTML = "";

      const lines = inputText.value
        .split("\n")
        .filter(line => line.trim() !== "");

      lines.forEach((line, index) => {

        const slug = createSlug(line);

        const item = document.createElement("div");
        item.className = "item";

        item.innerHTML = `

          <div class="number">
            ${index + 1}
          </div>

          <div class="slug-text">
            ${slug}
          </div>

          <button class="copy-btn">
            Copy
          </button>

        `;

        const button = item.querySelector(".copy-btn");

        button.addEventListener("click", () => {

          navigator.clipboard.writeText(slug);

          button.classList.remove("copied");

          button.classList.add("flash");

          button.innerText = "Copy";

          setTimeout(() => {

            button.classList.remove("flash");

            button.classList.add("copied");

            button.innerText = "Đã copy";

            item.classList.add("copied");

          }, 180);

        });

        button.addEventListener("mouseenter", () => {

          if(button.classList.contains("copied")){

            button.innerText = "Copy";

          }

        });

        button.addEventListener("mouseleave", () => {

          if(button.classList.contains("copied")){

            button.innerText = "Đã copy";

          }

        });

        results.appendChild(item);

      });

    }

    function clearText() {

      inputText.value = "";
      results.innerHTML = "";
      inputText.focus();

    }

    inputText.addEventListener("input", convertText);

  </script>

</body>
</html>
